<!DOCTYPE html>
<html>
<head>
<title>My Stock Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background-color: #111;
  color: white;
  text-align: center;
}
h1 {
  color: #00ffcc;
}
.section {
  margin: 30px 0;
}
</style>
</head>

<body>

<h1>📊 My Stock Analysis Dashboard</h1>

<div class="section">
<h2>NIFTY 50 Chart</h2>
<div class="tradingview-widget-container">
  <div id="tradingview_nifty"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script type="text/javascript">
  new TradingView.widget({
    "width": "100%",
    "height": 500,
    "symbol": "NSE:NIFTY",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "container_id": "tradingview_nifty"
  });
  </script>
</div>
</div>

<div class="section">
<h2>Reliance Industries Chart</h2>
<div id="tradingview_reliance"></div>
<script type="text/javascript">
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "NSE:RELIANCE",
  "interval": "D",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "tradingview_reliance"
});
</script>
</div>

</body>
</html>
