<!DOCTYPE html>
<html>
<head>
<title>Sector Heatmap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background-color: #0f172a;
  color: white;
  font-family: Arial;
  margin: 0;
}
header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: #111827;
}
.section {
  margin: 20px;
}
</style>
</head>

<body>

<header>📊 NIFTY Sector Heatmap Dashboard</header>

<div class="section">
<!-- TradingView Heatmap Widget -->
<div class="tradingview-widget-container">
  <div id="tradingview_heatmap"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script>
  new TradingView.widget({
    "width": "100%",
    "height": 700,
    "symbol": "NSE:NIFTY",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "container_id": "tradingview_heatmap"
  });
  </script>
</div>
</div>

</body>
</html>
