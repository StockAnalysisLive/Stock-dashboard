<!DOCTYPE html>
<html>
<head>
<title>Pro Stock Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0f172a;
  color: white;
}
header {
  background: #111827;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}
.section {
  margin: 30px;
}
h2 {
  border-left: 5px solid #22d3ee;
  padding-left: 10px;
}
</style>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<header>
📊 My Professional Stock Analysis Dashboard
</header>

<div class="section">
<h2>Market Overview</h2>
<div class="tradingview-widget-container">
  <div id="market_overview"></div>
  <script>
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "NSE:NIFTY",
    "interval": "D",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "container_id": "market_overview"
  });
  </script>
</div>
</div>

<div class="section">
<h2>Watchlist</h2>
<div class="tradingview-widget-container">
  <div id="watchlist"></div>
  <script>
  new TradingView.widget({
    "width": "100%",
    "height": 500,
    "symbols": [
      ["Reliance", "NSE:RELIANCE"],
      ["TCS", "NSE:TCS"],
      ["HDFC Bank", "NSE:HDFCBANK"],
      ["Infosys", "NSE:INFY"],
      ["ICICI Bank", "NSE:ICICIBANK"]
    ],
    "theme": "dark",
    "locale": "en",
    "container_id": "watchlist"
  });
  </script>
</div>
</div>

<div class="section">
<h2>Full Featured Chart</h2>
<div id="advanced_chart"></div>
<script>
new TradingView.widget({
  "width": "100%",
  "height": 600,
  "symbol": "NSE:NIFTY",
  "interval": "D",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "container_id": "advanced_chart"
});
</script>
</div>

</body>
</html>
